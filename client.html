<!DOCTYPE html>
<html lang="ko">
<link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<head>
    <meta charset="UTF-8">
    <title>BLACK RPG</title>
    <style>
        body {
            /* font-family: 'Consolas', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; */
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #121314;
            color: #C9D1D9;
            /* 1. 영문은 Consolas, 한글은 맑은 고딕(윈도우 표준) 적용 */
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            /* min-height: 100vh; */
            overflow: hidden;
            text-align: center;
            line-height: 1;
            /* user-select: none; */
            font-size: 14px;
        }

        html {
            overflow: hidden;
            overflow-y: scroll;
            height: 100%;

        }

        div {
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            position: relative;
            background-color: #121314;
        }

        input {
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            /* background-color: #121314; */
            line-height: 1;
            border-radius: 10px;
            text-align: center;
        }

        /* #알림 스타일 수정 */
        #알림 {
            /* 1. 기본 스타일 */
            /* ... 사용자님의 기존 스타일 (예: color: #F1C40F;) ... */

            /* [실무 포인트] 2. 부드러운 변화 설정 (CSS Transition) */
            /* opacity(투명도)가 변할 때 0.5초 동안 서서히 변하게 합니다. */
            transition: opacity 0.5s ease-in-out;

            /* 3. 초기 상태: 완전히 보임 */
            opacity: 1;
        }
    </style>
</head>

<body>
    <meta name="viewport" content="width=device-width, initial-scale=0.9">

    <script>

    </script>

</body>


</html>
