<html lang="ko">
<link rel="stylesheet" as="style" crossorigin

<head>
    <meta charset="UTF-8">
    <title>블랙Go!</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #121314;
            color: #C9D1D9;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            /* min-height: 100vh; */
            overflow: hidden;
            text-align: center;
            line-height: 1;
            user-select: none;
            font-size: 14px;
            gap: 5px;
        }

        html {
            overflow: hidden;
            overflow-y: scroll;
            height: 100%;

        }

        div {
            padding: 5px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
            position: relative;
            background-color: #121314;
            gap: 5px;
        }

        input {
            padding: 5px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
            border-radius: 10px;
            text-align: center;
        }

        #알림 {
            transition: opacity 0.5s ease-in-out;

            opacity: 1;
        }

        /* [style*="cursor: pointer"]:hover {
            color: #8B949E !important;
        } */
    </style>
</head>
