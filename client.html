<!DOCTYPE html>
<html lang="ko">
<link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<head>
    <meta charset="UTF-8">
    <title>BLACK RPG</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #121314;
            color: #C9D1D9;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            /* min-height: 100vh; */
            overflow: hidden;
            text-align: center;
            line-height: 1;
            user-select: none;
            font-size: 14px;
            gap: 5px;
        }

        html {
            overflow: hidden;
            overflow-y: scroll;
            height: 100%;

        }

        div {
            padding: 5px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
            position: relative;
            background-color: #121314;
            gap: 5px;
        }

        input {
            padding: 5px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
            border-radius: 10px;
            text-align: center;
        }

        #알림 {
            transition: opacity 0.5s ease-in-out;

            opacity: 1;
        }
    </style>
</head>

<body>

    <meta name="viewport" content="width=device-width, initial-scale=0.9">

    <script type="module">
        import * as 정의 from "./공용정의.js";

        for (const 이름 in 정의.스타일) {
            window[이름] = 정의.스타일[이름];
        }

        document.addEventListener("dragstart", 이벤트 => 이벤트.preventDefault());
        document.addEventListener("selectstart", 이벤트 => 이벤트.preventDefault());
        document.addEventListener("contextmenu", 이벤트 => 이벤트.preventDefault());

        window.유저 = null;
        window.접속토큰 = null;

        //아이콘정의
        const 보물상자아이콘 = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M385.5 132.8C393.1 119.9 406.9 112 421.8 112L424 112C446.1 112 464 129.9 464 152C464 174.1 446.1 192 424 192L350.7 192L385.5 132.8zM254.5 132.8L289.3 192L216 192C193.9 192 176 174.1 176 152C176 129.9 193.9 112 216 112L218.2 112C233.1 112 247 119.9 254.5 132.8zM344.1 108.5L320 149.5L295.9 108.5C279.7 80.9 250.1 64 218.2 64L216 64C167.4 64 128 103.4 128 152C128 166.4 131.5 180 137.6 192L96 192C78.3 192 64 206.3 64 224L64 256C64 273.7 78.3 288 96 288L544 288C561.7 288 576 273.7 576 256L576 224C576 206.3 561.7 192 544 192L502.4 192C508.5 180 512 166.4 512 152C512 103.4 472.6 64 424 64L421.8 64C389.9 64 360.3 80.9 344.1 108.4zM544 336L344 336L344 544L480 544C515.3 544 544 515.3 544 480L544 336zM296 336L96 336L96 480C96 515.3 124.7 544 160 544L296 544L296 336z"/></svg>`;
        const 스태미너아이콘 = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M128 320L156.5 92C158.5 76 172.1 64 188.3 64L356.9 64C371.9 64 384 76.1 384 91.1C384 94.3 383.4 97.6 382.3 100.6L336 224L475.3 224C495.5 224 512 240.4 512 260.7C512 268.1 509.8 275.3 505.6 281.4L313.4 562.4C307.5 571 297.8 576.1 287.5 576.1L284.6 576.1C268.9 576.1 256.1 563.3 256.1 547.6C256.1 545.3 256.4 543 257 540.7L304 352L160 352C142.3 352 128 337.7 128 320z"/></svg>`;
        const 골드아이콘 = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M536.3 160.9C526.9 134.4 506 113.5 479.5 103.9C455.4 96 433.2 96 387.9 96L252 96C207.2 96 184.8 96 160.7 103.5C134.2 113.1 113.3 134 103.7 160.5C96 184.8 96 207.2 96 252.2L96 387.8C96 433 96 455.2 103.5 479.3C113.1 505.8 134 526.7 160.5 536.3C184.8 544 207.2 544 252.1 544L387.8 544C432.8 544 455.2 544 479.4 536.3C505.9 526.7 526.8 505.8 536.4 479.3C544.1 455 544.1 432.6 544.1 387.8L544.1 252.3C544.1 207.3 544.1 184.9 536.4 160.8zM419.1 249.4L393.3 270.5C391 272.4 387.8 272 386 269.6C372.8 253.4 352.3 244.2 329.9 244.2C304.9 244.2 289.3 255.1 289.3 270.4C288.9 283.2 301 290 338.4 298.1C385.6 308.1 407.1 327.8 407.1 360.8C407.1 402.2 373.4 432.7 320.7 436.1L315.6 460.6C315.2 462.9 313 464.7 310.5 464.7L269.9 464.7C266.5 464.7 264.1 461.5 264.8 458.3L271.2 431C245.2 423.5 224 409 211.9 391.3C210.4 389 210.8 386 213 384.3L241.2 362.3C243.5 360.4 247 361 248.7 363.4C263.6 384.3 286.7 396.7 314.4 396.7C339.4 396.7 358.2 384.5 358.2 367C358.2 353.6 348.8 347.4 317 340.8C262.8 329.1 241.2 309 241.2 275.9C241.2 237.5 273.4 208.7 322.1 204.9L327.4 179.5C327.8 177.2 330 175.4 332.5 175.4L372.4 175.4C375.6 175.4 378.2 178.4 377.5 181.6L371.3 210C392.2 216.4 409.3 227.9 420 242.2C421.7 244.3 421.3 247.5 419.1 249.2z"/></svg>`;
        const 다이아아이콘 = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M232.5 136L320 229L407.5 136L232.5 136zM447.9 163.1L375.6 240L504.6 240L448 163.1zM497.9 288L142.1 288L320 484.3L497.9 288zM135.5 240L264.5 240L192.2 163.1L135.6 240zM569.8 280.1L337.8 536.1C333.3 541.1 326.8 544 320 544C313.2 544 306.8 541.1 302.2 536.1L70.2 280.1C62.5 271.6 61.9 258.9 68.7 249.7L180.7 97.7C185.2 91.6 192.4 87.9 200 87.9L440 87.9C447.6 87.9 454.8 91.5 459.3 97.7L571.3 249.7C578.1 258.9 577.4 271.6 569.8 280.1z"/></svg>`;



        정의.객체생성(document.body, `상단바`, 밑줄, 가로꽉);
        정의.객체생성(상단바, `상단바박스`, 가로길이(400),);
        정의.객체생성(상단바박스, `상단바박스박스`, 양쪽,);
        정의.객체생성(상단바박스박스, `상단바박스박스좌`, 노여백);
        정의.객체생성(상단바박스박스좌, `타이틀과아이디`,);
        타이틀과아이디.innerHTML = `BLACKGO`;

        정의.객체생성(상단바박스박스, `상단바박스박스우`, 오른쪽, 노여백, 숨기기);
        정의.객체생성(상단바박스박스우, `모험`, 버튼);
        모험.innerHTML = `모험`;
        정의.객체생성(상단바박스박스우, `장비`, 버튼);
        장비.innerHTML = `장비`;
        정의.객체생성(상단바박스박스우, `설정`, 버튼);
        설정.innerHTML = `설정`;
        정의.객체생성(설정, `설정메뉴화면박스`, 메뉴, 테두리, 가로길이(80));
        정의.객체생성(설정메뉴화면박스, `로그아웃`, 버튼);
        로그아웃.innerHTML = `로그아웃`;
        정의.객체생성(설정메뉴화면박스, `회원탈퇴`, 버튼);
        회원탈퇴.innerHTML = `회원탈퇴`;
        회원탈퇴.style.color = 정의.색상.중빨;

        정의.객체생성(document.body, `화면가리개`, 가림막,);

        정의.객체생성(document.body, `팝업화면박스`, 화면중앙, 가로길이(380), 테두리);
        //팝업함수
        function 팝업(메세지) {
            if (window.event) {
                window.event.stopPropagation();
            }

            return new Promise((resolve) => {
                팝업화면박스.innerHTML = '';
                팝업화면박스.style.display = 'flex';

                정의.객체생성(팝업화면박스, '팝업메세지', 왼쪽);
                팝업메세지.innerHTML = 메세지;

                정의.객체생성(팝업화면박스, '버튼영역', 양쪽);

                정의.객체생성(버튼영역, '취소버튼', 버튼, 테두리);
                취소버튼.innerHTML = '취소';
                취소버튼.onclick = () => {
                    팝업화면박스.style.display = 'none';
                    resolve(false); // false를 반환하고 끝냄
                };

                // 확인 버튼
                정의.객체생성(버튼영역, '확인버튼', 버튼, 테두리);
                확인버튼.innerHTML = '확인';
                확인버튼.onclick = () => {
                    팝업화면박스.style.display = 'none';
                    resolve(true); // true를 반환하고 끝냄
                };
            });
        }



        async function 서버요청(유형, 데이터) {

            화면가리개.style.display = 'block';

            try {
                const 응답 = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 유형, 데이터 }) // 명령과 데이터를 묶어서 전송
                });
                return await 응답.json();
            } catch (에러) {
                console.error("통신 에러:", 에러);
                return { 성공: false, 메세지: "서버 연결 실패" };
            } finally {
                화면가리개.style.display = 'none';
            }
        }

        //화면초기화함수
        function 화면초기화() {
            const 모든화면 = document.querySelectorAll('[id$="화면박스"]');
            모든화면.forEach(h => h.style.display = 'none');
        }

        function 알림표시(메시지) {
            알림.style.transition = 'none';

            알림.innerHTML = 메시지;
            알림.style.opacity = 1;

            if (window.알림타이머) {
                clearTimeout(window.알림타이머);
            }

            setTimeout(() => {
                알림.style.transition = 'opacity 0.5s';
            }, 10);

            window.알림타이머 = setTimeout(() => {
                알림.style.opacity = 0;

                setTimeout(() => {
                    if (알림.style.opacity == 0) {
                        알림.innerHTML = '　';
                    }
                }, 500);
            }, 2500);
        }

        //알림객체
        정의.객체생성(document.body, `알림`,);
        알림.style.color = 정의.색상.진노;
        알림.innerHTML = `　`;

        function 메인화면함수() {
            화면초기화();
            알림표시('BLACKGO에 오신걸 환영합니다');

            if (!window.메인화면박스) {
                정의.객체생성(document.body, '메인화면박스', 가로길이(400), 테두리,);
            }

            메인화면박스.innerHTML = '';
            메인화면박스.style.display = 'flex';

            정의.인풋생성(메인화면박스, '아이디입력', { placeholder: '아이디를 입력하세요' },);
            아이디입력.oninput = () => {
                if (아이디입력.value.length >= 6) {
                    알림표시('아이디는 6자까지만 가능합니다');

                    아이디입력.value = 아이디입력.value.slice(0, 6);
                }
            };


            정의.인풋생성(메인화면박스, '비번입력', { type: 'password', placeholder: '비밀번호를 입력하세요' },);


            정의.객체생성(메인화면박스, `회원가입`, 버튼, 테두리,);
            회원가입.innerHTML = `회원가입`;

            회원가입.onclick = async () => {
                알림표시('회원가입중');

                try {
                    const 결과 = await 서버요청('회원가입', {
                        아이디: 아이디입력.value,
                        비번: 비번입력.value
                    });
                    알림표시(결과.메세지);
                } catch (에러) {
                    알림표시("서버 응답 없음");
                }
            };



            정의.객체생성(메인화면박스, `로그인`, 버튼, 테두리,);
            로그인.innerHTML = `로그인`;

            로그인.onclick = async () => {
                const 결과 = await 서버요청('로그인', {
                    아이디: 아이디입력.value,
                    비번: 비번입력.value
                });

                if (결과.성공) {
                    유저 = 결과.데이터;
                    접속토큰 = 결과.토큰;

                    타이틀과아이디.innerHTML = 유저.아이디;

                    로그인시생성화면함수();
                    장비화면함수();

                    알림표시('로그인되었습니다');

                } else {
                    알림표시(결과.메세지);
                }
            };



        }

        메인화면함수();

        function 로그인시생성화면함수() {
            화면초기화();

            상단바박스박스우.style.display = 'flex';

            설정.onclick = (e) => {
                e.stopPropagation();
                const isHidden = 설정메뉴화면박스.style.display === 'none';
                설정메뉴화면박스.style.display = isHidden ? 'flex' : 'none';
            };

            로그아웃.onclick = async () => {
                location.reload();
            };

            회원탈퇴.onclick = async () => {
                const 확인 = await 팝업(`정말로 탈퇴하시겠습니까?<br>데이터가 모두 사라집니다.`);
                if (!확인) return;
                const 탈퇴결과 = await 서버요청('회원탈퇴', { 아이디: 유저.아이디, 토큰: 접속토큰 });
                if (탈퇴결과.성공) {
                    알림표시(탈퇴결과.메세지);
                    location.reload();
                } else {
                    알림표시(탈퇴결과.메세지);
                }
            };

            장비.onclick = async () => {
                장비화면함수();
            };



            if (!window.로그인시생성) {
                정의.객체생성(document.body, '로그인시생성', 가로길이(400), 테두리,);
            }

            로그인시생성.innerHTML = '';
            로그인시생성.style.display = 'flex';

            정의.객체생성(로그인시생성, '로그인시생성재화', 노여백, 양쪽);
            정의.객체생성(로그인시생성재화, '스태미너', 중앙);
            스태미너.innerHTML = `${정의.svg정제(스태미너아이콘, 20)}${유저.현재스태미너}/${유저.최대스태미너}`;
            정의.객체생성(로그인시생성재화, '다이아', 중앙);
            다이아.innerHTML = `${정의.svg정제(다이아아이콘, 20)}${유저.현재다이아}`;
            정의.객체생성(로그인시생성재화, '골드', 중앙);
            골드.innerHTML = `${정의.svg정제(골드아이콘, 20)}${유저.현재골드}`;

        }




        function 장비화면함수() {
            화면초기화();

            if (!window.장비화면박스) {
                정의.객체생성(document.body, '장비화면박스', 가로길이(400), 테두리,);
            }

            장비화면박스.innerHTML = '';
            장비화면박스.style.display = 'flex';

            정의.객체생성(장비화면박스, '장비화면박스1행', 양쪽,);

            정의.객체생성(장비화면박스1행, '장비화면박스1행1열',);

            const 장착무기 = 유저.장비.find(v => v.유형 === '무기' && v.장착 === 1);
            const 장착방어구 = 유저.장비.find(v => v.유형 === '방어구' && v.장착 === 1);
            const 장착장갑 = 유저.장비.find(v => v.유형 === '장갑' && v.장착 === 1);
            const 장착신발 = 유저.장비.find(v => v.유형 === '신발' && v.장착 === 1);
            const 장착목걸이 = 유저.장비.find(v => v.유형 === '목걸이' && v.장착 === 1);
            const 장착반지 = 유저.장비.find(v => v.유형 === '반지' && v.장착 === 1);

            정의.객체생성(장비화면박스1행1열, '장비화면박스1행1열1행', 정사각형(100, 100), 테두리);
            장비화면박스1행1열1행.innerHTML = `${장착무기?.이름 ? `${장착무기.이름} +${장착무기.레벨}` : `(비어있음)`}`;
            정의.객체생성(장비화면박스1행1열1행, '장착유형무기', 좌상단, 노여백);
            장착유형무기.innerHTML = `무기`;

            정의.객체생성(장비화면박스1행1열, '장비화면박스1행1열2행', 정사각형(100, 100), 테두리);

        //외부클릭
        window.addEventListener('click', () => {
            if (window.설정메뉴화면박스) {
                설정메뉴화면박스.style.display = 'none';
            }

            if (window.팝업화면박스) {
                팝업화면박스.style.display = 'none';
            }

        });

        //단축키설정
        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            // 2. 누른 키 확인 (대소문자 구분 없이 처리하기 위해 toLowerCase() 사용)
            const key = e.key.toLowerCase();

            // 3. 단축키별 매핑
            switch (key) {
                case 's': // 'M' 키: 모험(Adventure)
                case 'ㄴ': // 한글 상태일 때 대비
                    if (typeof 모험 !== 'undefined' && 모험) {
                        모험.click();
                    }
                    break;

                case 'a': // 'I' 키: 인벤토리(Inventory)
                case 'ㅁ':
                    if (typeof 타이틀과아이디 !== 'undefined') {
                        타이틀과아이디.click();
                    }
                    break;

                case 'q': // 'I' 키: 인벤토리(Inventory)
                case 'ㅂ':
                    if (typeof 탈퇴항목 !== 'undefined') {
                        탈퇴항목.click();
                    }
                    break;

                case 'w': // 'I' 키: 인벤토리(Inventory)
                case 'ㅈ':
                    if (typeof 로그아웃항목 !== 'undefined') {
                        로그아웃항목.click();
                    }
                    break;

                case 'escape': // ESC 키: 설정창 닫기 등
                    break;
            }
        });


    </script>
