    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #121314;
            color: #C9D1D9;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            text-align: center;
            line-height: 1.2;
            user-select: none;
            font-size: 14px;
            gap: 5px;
        }

        html {
            overflow: hidden;
            overflow-y: scroll;
            height: 100%;

        }

        div {
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
            position: relative;
            background-color: #121314;
            gap: 5px;
            white-space: nowrap;
            padding: 5px;
            border-radius: 10px;
        }

        input {
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
            border-radius: 10px;
            text-align: center;
            white-space: nowrap;
            padding: 5px;
            border-radius: 10px;
        }

        #알림 {
            transition: opacity 0.5s ease-in-out;

            opacity: 1;
        }

        .버튼:hover {
            background-color: #3b3d3f !important;
        }
    </style>
</head>
